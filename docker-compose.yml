networks:
  app_network:
    driver: bridge
  coolify: # once deployment happens on other infrastructure we'll have to revisit this
    external: true

services:
  # ── Database (always runs) ────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5431:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── Backend: development (hot-reload) ─────────────────────────
  backend-dev:
    profiles: ['dev']
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: backend
    restart: unless-stopped
    ports:
      - '86:86'
      - '9229:9229'
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - USE_HTTPS=true
      - FRONTEND_URL=https://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/backend/node_modules
      - ./certs:/workspace/certs:ro
    networks:
      app_network:
        aliases: [api]

  # ── Backend: production ───────────────────────────────────────
  backend:
    profiles: ['prod']
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    container_name: backend
    restart: unless-stopped
    expose:
      - '86'
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - USE_HTTPS=false
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:86/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      app_network:
        aliases: [api]

  # ── Frontend: development (Vite HMR) ─────────────────────────
  frontend-dev:
    profiles: ['dev']
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: frontend
    restart: unless-stopped
    ports:
      - '3000:5173'
    environment:
      - VITE_API_URL=https://localhost:86
    depends_on:
      - backend-dev
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/frontend/node_modules
      - ./certs:/workspace/certs:ro
    networks:
      - app_network

  # ── Frontend: production (nginx) ──────────────────────────────
  frontend:
    profiles: ['prod']
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: frontend
    restart: unless-stopped
    expose:
      - '80'
    labels:
      - traefik.enable=true
      - traefik.http.services.frontend.loadbalancer.server.port=80
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:80/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
      - coolify

volumes:
  postgres_data:
    driver: local
